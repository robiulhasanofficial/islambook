<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0ea5e9" />
  <title>IBGM</title>
  <link rel="icon" href="/logo/logo.png" type="image/png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ========================
       LEFT: three-dot menu
       ======================== -->
  <div id="left-three-dot" class="left-three-dot" aria-hidden="false">
    <button id="threeDotBtn"
            class="three-dot-btn"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="sideMenu"
            title="মেনু খুলুন"
            type="button">
      <span class="dot" aria-hidden="true"></span>
      <span class="dot" aria-hidden="true"></span>
      <span class="dot" aria-hidden="true"></span>
      <span class="sr-only">Open menu</span>
    </button>

    <!-- SIDE MENU PANEL -->
    <nav id="sideMenu" class="side-menu" role="navigation" aria-label="Primary side menu" hidden>
      <div class="sm-header">
        <strong>Menu</strong>
        <button id="sideMenuClose" class="sm-close" aria-label="বন্ধ করুন">✕</button>
      </div>

      <ul class="sm-list" role="menu">
        <!-- Other menu items can go here -->
        <li role="none">
          <!-- Messenger launcher -->
          <button id="openMessengerBtn"
                  class="sm-item"
                  role="menuitem"
                  type="button"
                  aria-controls="messengerPanel"
                  aria-expanded="false">
            💬 Messenger (প্রাইভেট)
          </button>
        </li>

        <!-- You can add more menu items below -->
      </ul>
    </nav>
  </div>

  <!-- ========================
       MESSENGER PANEL (PRIVATE)
       ======================== -->
  <aside id="messengerPanel" class="messenger-panel" role="dialog" aria-label="Private messenger" hidden>
    <div class="mp-header">
      <div><strong>Messenger</strong></div>
      <div>
        <button id="mpCloseBtn" class="mp-close" aria-label="বন্ধ করুন">✕</button>
      </div>
    </div>

    <!-- Search/filter inside messenger -->
    <div class="mp-search">
      <input id="mpSearch" placeholder="Search person..." aria-label="Search messenger contacts" />
    </div>

    <!-- Contacts list -->
    <div id="mpContactsWrap" class="mp-contacts-wrap" role="region" aria-label="Contacts">
      <ul id="mpContacts" class="mp-contacts" role="list" aria-live="polite">
        <li class="mp-empty">কোথাও কেউ নেই — রিফ্রেশ করুন</li>
      </ul>
    </div>

    <!-- Footer actions -->
    <div class="mp-footer">
      <button id="mpRefreshBtn" type="button">রিফ্রেশ</button>
    </div>

    <!-- Template for a contact item -->
    <template id="mpContactTemplate">
      <li class="mp-item" role="listitem" data-user-id="">
        <button class="mp-item-btn" type="button" aria-label="Open chat with user">
          <span class="mp-avatar" aria-hidden="true"></span>
          <span class="mp-name">User Name</span>
          <span class="mp-online" aria-hidden="true">●</span>
        </button>
      </li>
    </template>
  </aside>

  <!-- ========================
       PRIVATE CHAT WINDOW (one per active private conversation)
       JS will create/open instances of this panel when a contact is clicked.
       ======================== -->
  <div id="privateChatsContainer" class="private-chats-container" aria-live="polite">
    <!-- Example skeleton panel (hidden). JS will clone and populate using template below -->
    <template id="privateChatTemplate">
      <section class="private-chat" role="dialog" aria-label="Private chat" data-peer-id="" hidden>
        <div class="pc-header">
          <div class="pc-title">
            <button class="pc-back" aria-label="Back to contacts">←</button>
            <div class="pc-peer-name">Person Name</div>
          </div>
          <div>
            <button class="pc-close" aria-label="Close chat">✕</button>
          </div>
        </div>

        <div class="pc-messages" role="log" aria-live="polite">
          <!-- messages will be appended here -->
          <!-- Example message template used by JS -->
        </div>

        <div class="pc-input">
          <input class="pc-text" placeholder="Type a message..." aria-label="Type a private message" />
          <button class="pc-send" type="button">Send</button>
        </div>
      </section>
    </template>

    <!-- Template for a single message bubble -->
    <template id="privateMsgTemplate">
      <div class="pc-msg" data-msg-id="">
        <div class="pc-msg-meta">
          <span class="pc-msg-sender">Me / Them</span>
          <time class="pc-msg-time" datetime=""></time>
        </div>
        <div class="pc-msg-body">Message text</div>
      </div>
    </template>
  </div>

  <!-- ========================
       EXISTING CONTENT (kept mostly unchanged)
       ======================== -->
  <!-- Active Users Widget (top-left). CSS will position it fixed at top-left. -->
  <div id="active-users-widget" class="active-users-widget" role="region" aria-label="Active users" data-widget="active-users">
    <!-- Toggle button: shows count + opens/closes the users panel -->
    <button
      id="active-users-toggle"
      class="au-toggle"
      aria-expanded="false"
      aria-controls="active-users-list"
      title="অনলাইন ব্যবহারকারীরা দেখাও/লুকাও"
      type="button"
    >
      <span class="au-dot" aria-hidden="true"></span>
      <span id="active-users-count" class="au-count" aria-live="polite">0</span>
      <span class="au-label">অনলাইন</span>
    </button>

    <!-- Panel with list of users. Hidden by default; toggled by JS. -->
    <div id="active-users-list" class="au-list" hidden aria-hidden="true" role="dialog" aria-label="Online users list">
      <div class="au-list-header">
        <strong>অনলাইন ব্যবহারকারী</strong>
        <button id="au-list-close" class="au-close" aria-label="লিস্ট বন্ধ" title="বন্ধ করুন">×</button>
      </div>

      <!-- Template for a single user row (name + id). JS will clone this. -->
      <template id="au-item-template">
        <li class="au-item" role="listitem" data-user-id="">
          <span class="au-item-name" aria-hidden="false">User name</span>
          <span class="au-item-id" aria-label="User ID">#id</span>
        </li>
      </template>

      <ul id="active-users-ul" class="au-ul" role="list" aria-live="polite">
        <li class="au-empty">কেউ অনলাইন নেই</li>
      </ul>

      <!-- Optional footer area for actions (copy list, refresh, etc.) -->
      <div class="au-list-footer">
        <button id="au-copy-list" class="au-action" type="button" title="অনলাইনদের নাম/আইডি কপি করুন">কপি</button>
        <button id="au-refresh" class="au-action" type="button" title="রিফ্রেশ">রিফ্রেশ</button>
      </div>
    </div>

    <!-- Fallback for users with JS disabled -->
    <noscript>
      <div class="au-noscript">জাভাস্ক্রিপ্ট চালু করুন — অনলাইন কাউন্ট দেখার জন্য প্রয়োজন।</div>
    </noscript>
  </div>

  <div class="wrap">
    <header class="app">
      <div style="display:flex;align-items:center">
        <div class="logo" aria-hidden="true">IB</div>
        <h1 class="title">IBGM</h1>
      </div>

      <div class="header-right">
        <div class="search-wrap" title="Search by user name or ID (partial OK)">
          <input id="searchInput" placeholder="Search name or ID" aria-label="Search posts" />
          <button id="searchBtn" aria-label="Search">Search</button>
        </div>

        <div class="id-badge" id="idBadge" title="Click to copy your ID">You: —</div>
      </div>
    </header>

    <section class="card upload" aria-label="Upload image">
      <input class="file" type="file" id="imageInput" accept="image/*" />
      <input type="text" id="caption" placeholder="Caption (optional)" />
      <button class="primary" id="uploadBtn">Upload</button>
      <small id="uploadNote" style="color:var(--muted)">We auto-resize for best viewing — full image always visible in viewer.</small>
    </section>

    <div id="searchInfo" style="display:none;color:var(--muted);margin-top:10px"></div>

    <section id="feed" aria-live="polite"></section>

    <p style="margin-top:18px;color:var(--muted)">JEHAD HASAN </p>
  </div>

  <!-- Lightbox / Viewer -->
  <div id="lightboxOverlay" class="lightbox-overlay" aria-hidden="true" role="dialog" aria-label="Image viewer">
    <div class="lightbox-inner">
      <div class="lightbox-canvas" tabindex="0">
        <img id="lbImg" src="" alt="" draggable="false" />
      </div>
      <div class="lb-controls" role="toolbar" aria-label="Viewer controls">
        <button id="zoomIn" class="lb-btn" title="Zoom in">＋</button>
        <button id="zoomOut" class="lb-btn" title="Zoom out">－</button>
        <button id="resetZoom" class="lb-btn" title="Reset zoom">○</button>
        <button id="closeLBox" class="lb-btn" title="Close viewer">✕</button>
      </div>
      <div id="lbHint" class="lb-hint">Pinch • Double-tap • Drag</div>
      <div id="lbCaption" class="lb-caption"></div>
    </div>
  </div>

  <!-- Chat UI: floating button + panel -->
  <button id="chatToggleBtn" class="chat-button" aria-label="Open global messages">💬
    <span id="chatUnread" class="chat-unread" style="display:none">0</span>
  </button>

  <div id="chatPanel" class="chat-panel" style="display:none" role="dialog" aria-label="Global messages">
    <div class="chat-header">
      <div>Everyone's Messages</div>
      <div>
        <button id="chatCloseBtn" title="Close" style="border:0;background:transparent;color:var(--muted);cursor:pointer">✕</button>
      </div>
    </div>
    <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
    <div class="chat-input">
      <input id="chatInput" placeholder="Message everyone..." aria-label="Type a message" />
      <button id="chatSendBtn">Send</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" defer></script>
  <!-- script.js will wire up socket events, toggle behavior, and list rendering -->
  <script src="script.js" defer></script>
</body>
</html>
